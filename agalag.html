<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGALAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0b1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            padding: 10px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #000010;
            border: 4px solid #1a196e;
            border-radius: 12px;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(100, 80, 255, 0.5);
            max-height: calc(100vh - 140px);
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            touch-action: none;
        }

        /* --- Floating D-Pad --- */
        #floating-dpad {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: repeat(3, 48px);
            grid-template-rows: repeat(3, 48px);
            gap: 4px;
            z-index: 100;
            padding: 10px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            touch-action: none;
            transition: box-shadow 0.3s, transform 0.1s;
        }

        #floating-dpad.is-dragging {
            box-shadow: 0 0 30px #6464ff;
            border: 2px solid #6464ff;
            opacity: 0.95;
            transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 15px #6464ff; }
            50%  { box-shadow: 0 0 40px #6464ff; }
            100% { box-shadow: 0 0 15px #6464ff; }
        }

        .btn-control {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            user-select: none;
            color: white;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto;
        }

        .btn-control:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }

        #btn-fire {
            background: rgba(255, 80, 80, 0.4);
            border: 1px solid rgba(255, 120, 120, 0.6);
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
        }

        .active-ship {
            outline: 3px solid #fff;
            outline-offset: 2px;
            transform: scale(1.1);
        }

        #overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .dialog-box {
            background: #111122;
            border: 3px solid #3333cc;
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 20px rgba(50, 50, 200, 0.3);
        }
        .hidden { display: none !important; }

        .stat-label {
            font-size: 8px;
            color: #9ca3af;
            font-weight: 800;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: monospace;
            font-size: 16px;
            color: #fbbf24;
        }

        @media (min-width: 768px) {
            #floating-dpad { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Header Stats -->
        <div class="grid grid-cols-2 gap-2 bg-gray-900 p-3 rounded-lg border border-gray-700">
            <div class="flex flex-col gap-1 border-r border-gray-700 pr-2">
                <div class="flex justify-between items-end">
                    <h1 class="text-md font-bold text-red-500 tracking-tighter leading-none">AGALAG</h1>
                    <span id="level-indicator" class="text-[10px] text-white font-black uppercase">STAGE 1</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="stat-label">HI STAGE</span>
                    <span id="hi-level" class="stat-value text-white">1</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="stat-label">HI SCORE</span>
                    <span id="hi-score" class="stat-value">0000</span>
                </div>
            </div>
            <div class="flex flex-col gap-1 pl-2">
                <div class="flex justify-between items-center">
                    <span class="stat-label text-yellow-500">SCORE</span>
                    <span id="current-score" class="stat-value">0000</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="stat-label">LIVES</span>
                    <span id="enemy-count" class="stat-value text-red-400">3</span>
                </div>
                <div class="flex justify-end items-center gap-2 mt-1">
                    <button id="mute-btn" class="bg-gray-800 p-1 rounded hover:bg-gray-700 transition" title="Mute/Unmute">
                        <svg id="svg-unmuted" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="block"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        <svg id="svg-muted" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                    </button>
                    <button id="fullscreen-btn" class="bg-gray-800 p-1 rounded hover:bg-gray-700 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div class="relative flex-grow flex items-center justify-center">
            <canvas id="gameCanvas"></canvas>

            <div id="ready-timer" class="absolute inset-0 z-20 hidden flex items-center justify-center pointer-events-none">
                <h2 id="timer-text" class="text-6xl font-black italic text-red-500">3</h2>
            </div>

            <!-- Overlay -->
            <div id="overlay" class="absolute inset-0 z-10 flex items-center justify-center p-4 rounded-lg">
                <div class="dialog-box p-6 rounded-2xl max-w-xs w-full text-center transform transition-all">

                    <div id="start-content">
                        <h2 class="text-3xl font-black text-red-600 mb-1 italic leading-tight">AGALAG</h2>
                        <p class="text-xs mb-4 text-gray-400 font-bold uppercase tracking-widest">This time, YOU are the invader.</p>
                        <p class="text-xs mb-4 text-gray-300 font-bold uppercase">Press ENTER to Start</p>
                        <button id="toggle-high-scores-btn" class="bg-gray-700 hover:bg-gray-600 text-white w-full py-2 rounded-lg font-black text-xs mb-3 uppercase tracking-wider">
                            High Scores
                        </button>
                        <div id="high-scores-panel" class="hidden bg-black/40 p-3 rounded-lg mb-4 border border-gray-800 text-left">
                            <p class="text-[10px] text-yellow-400 font-black uppercase mb-2">Leaderboard</p>
                            <ol id="high-scores-list" class="text-xs text-gray-200 list-decimal list-inside space-y-1"></ol>
                        </div>
                        <button id="start-btn" class="bg-red-600 hover:bg-red-700 active:scale-95 text-white w-full py-4 rounded-xl font-black text-xl shadow-lg border-b-4 border-red-800 uppercase tracking-tighter">
                            Start
                        </button>
                        <p class="text-[10px] mt-4 text-gray-500 font-bold uppercase">Hold D-Pad for 3s to drag</p>
                    </div>

                    <div id="end-content" class="hidden">
                        <h2 id="end-title" class="text-3xl font-black mb-2"></h2>
                        <div class="bg-black/40 p-3 rounded-lg mb-6 border border-gray-800 text-center">
                            <p id="level-bonus-text" class="text-xs text-yellow-500 font-bold uppercase mb-1">Stage: 1</p>
                            <p id="end-body" class="text-sm text-gray-300"></p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button id="next-level-btn" class="bg-green-600 hover:bg-green-700 text-white w-full py-4 rounded-xl font-black text-lg shadow-lg hidden">CONTINUE</button>
                            <button id="overlay-restart-btn" class="bg-blue-600 hover:bg-blue-700 text-white w-full py-4 rounded-xl font-black text-lg shadow-lg">PLAY AGAIN (OR PRESS ENTER)</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Utility Buttons (mobile only) -->
        <div class="flex flex-row justify-between items-center w-full px-4 pb-6 select-none md:hidden">
            <div class="flex flex-col items-center gap-2">
                <button id="quit-btn" class="bg-gray-800 active:bg-gray-900 text-gray-500 w-16 h-16 flex flex-col items-center justify-center rounded-2xl border border-gray-700 shadow-md">
                    <span class="text-lg">✖</span>
                    <span class="text-[8px] font-black uppercase">Quit</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Draggable D-Pad (left / fire / right only) -->
    <div id="floating-dpad">
        <div class="w-[48px] h-[48px]"></div>
        <div class="w-[48px] h-[48px]"></div>
        <div class="w-[48px] h-[48px]"></div>

        <div class="btn-control" id="btn-left">◀</div>
        <div class="btn-control" id="btn-fire">🔥</div>
        <div class="btn-control" id="btn-right">▶</div>

        <div class="w-[48px] h-[48px]"></div>
        <div class="w-[48px] h-[48px]"></div>
        <div class="w-[48px] h-[48px]"></div>
    </div>

<script>
    const canvas        = document.getElementById('gameCanvas');
    const ctx           = canvas.getContext('2d');
    const livesEl       = document.getElementById('enemy-count');
    const stageEl       = document.getElementById('level-indicator');
    const hiStageEl     = document.getElementById('hi-level');
    const scoreEl       = document.getElementById('current-score');
    const hiScoreEl     = document.getElementById('hi-score');
    const overlay       = document.getElementById('overlay');
    const startContent  = document.getElementById('start-content');
    const endContent    = document.getElementById('end-content');
    const nextLevelBtn  = document.getElementById('next-level-btn');
    const restartBtn    = document.getElementById('overlay-restart-btn');
    const timerLayer    = document.getElementById('ready-timer');
    const timerText     = document.getElementById('timer-text');
    const dpad          = document.getElementById('floating-dpad');
    const quitBtn       = document.getElementById('quit-btn');
    const muteBtn       = document.getElementById('mute-btn');
    const svgMuted      = document.getElementById('svg-muted');
    const svgUnmuted    = document.getElementById('svg-unmuted');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const highScoresBtn = document.getElementById('toggle-high-scores-btn');
    const highScoresPanel = document.getElementById('high-scores-panel');
    const highScoresList = document.getElementById('high-scores-list');

    const STORAGE_KEY = 'agalag_high_scores';
    const MAX_HIGH_SCORES = 5;
    const keys = { left: false, right: false, fire: false };
    let gameState = 'TITLE';
    let animFrameId = null;
    let lastTs = 0;
    let isMuted = false;
    let audioCtx = null;
    let stars = [];
    let playerBullets = [];
    let heroBullets = [];
    let explosions = [];
    let highScores = [];

    let stage = 1;
    let score = 0;
    let lives = 3;
    let highestStage = 1;
    let shootCooldownMs = 0;
    let player = null;
    let hero = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type, duration, volume = 0.1, startDelay = 0) {
        if (isMuted || !audioCtx) return;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startDelay);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime + startDelay);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startDelay + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + startDelay);
        osc.stop(audioCtx.currentTime + startDelay + duration);
    }

    const SFX = {
        shoot: () => {
            playSound(900, 'square', 0.06, 0.05);
            playSound(650, 'triangle', 0.12, 0.04, 0.03);
        },
        explode: () => {
            playSound(190, 'sawtooth', 0.23, 0.08);
            setTimeout(() => playSound(120, 'sawtooth', 0.28, 0.06), 70);
        },
        start: () => [330, 392, 494, 659].forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.14, 0.06), i * 90)),
        heroFire: () => playSound(420, 'triangle', 0.1, 0.04),
    };

    function getStageParams(currentStage) {
        const stageBoost = currentStage - 1;
        const upgradeTier = Math.floor(stageBoost / 3);
        return {
            reactionDelay: Math.max(100, 200 - stageBoost * 8),
            fireMin: Math.max(520, 800 - stageBoost * 18),
            fireMax: Math.max(760, 1200 - stageBoost * 20),
            mistakeChance: Math.max(0.04, 0.2 - stageBoost * 0.012),
            aimError: Math.max(4, 22 - stageBoost),
            heroSpeed: 170 + stageBoost * 14 + (upgradeTier >= 2 ? 45 : 0),
            playerDescentSpeed: 115 + stageBoost * 9,
            heroDualShot: currentStage >= 4,
            heroUpgradeTier: upgradeTier,
        };
    }

    function resizeCanvas() {
        canvas.width = 600;
        canvas.height = 800;
        initStars();
    }

    function initStars() {
        stars = Array.from({ length: 90 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            speed: 18 + Math.random() * 42,
            size: Math.random() < 0.2 ? 2 : 1,
        }));
    }

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function hitbox(entity, inset = 0) {
        return {
            x: entity.x + inset,
            y: entity.y + inset,
            w: Math.max(1, entity.w - inset * 2),
            h: Math.max(1, entity.h - inset * 2),
        };
    }

    function rectsOverlap(a, b) {
        return !(a.x + a.w < b.x || b.x + b.w < a.x || a.y + a.h < b.y || b.y + b.h < a.y);
    }

    function getHighScores() {
        try {
            const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function saveHighScores(scores) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores.slice(0, MAX_HIGH_SCORES)));
    }

    function syncHighStats() {
        const best = highScores[0] || { score: 0, stage: 1 };
        hiScoreEl.innerText = String(best.score).padStart(4, '0');
        hiStageEl.innerText = String(best.stage || 1);
    }

    function renderHighScores() {
        highScoresList.innerHTML = '';
        if (!highScores.length) {
            const li = document.createElement('li');
            li.className = 'list-none text-gray-400';
            li.textContent = 'No runs yet';
            highScoresList.appendChild(li);
            return;
        }
        highScores.forEach(entry => {
            const li = document.createElement('li');
            li.textContent = `${String(entry.score).padStart(4, '0')} pts - Stage ${entry.stage}`;
            highScoresList.appendChild(li);
        });
    }

    function recordHighScore() {
        highScores.push({ score, stage: highestStage, ts: Date.now() });
        highScores.sort((a, b) => b.score - a.score || b.stage - a.stage || b.ts - a.ts);
        highScores = highScores.slice(0, MAX_HIGH_SCORES);
        saveHighScores(highScores);
        syncHighStats();
        renderHighScores();
    }

    function updateHud() {
        scoreEl.innerText = String(score).padStart(4, '0');
        stageEl.innerText = `STAGE ${stage}`;
        livesEl.innerText = String(lives);
        syncHighStats();
    }

    function spawnExplosion(x, y, color) {
        explosions.push({ x, y, color, life: 0.35 });
    }

    function resetPlayer() {
        const params = getStageParams(stage);
        player = {
            x: canvas.width / 2 - 17,
            y: 70,
            w: 34,
            h: 28,
            speed: 260,
            descentSpeed: params.playerDescentSpeed,
            active: true,
            respawnAt: 0,
        };
    }

    function resetHero() {
        const params = getStageParams(stage);
        hero = {
            x: canvas.width / 2 - 16,
            y: canvas.height - 74,
            w: 32,
            h: 26,
            active: true,
            respawnAt: 0,
            reactionTimer: 0,
            fireTimer: params.fireMin + Math.random() * (params.fireMax - params.fireMin),
            targetX: canvas.width / 2 - 16,
            params,
        };
    }

    function startGame() {
        initAudio();
        stage = 1;
        score = 0;
        lives = 3;
        highestStage = 1;
        shootCooldownMs = 0;
        playerBullets = [];
        heroBullets = [];
        explosions = [];
        resetPlayer();
        resetHero();
        updateHud();
        startContent.classList.add('hidden');
        endContent.classList.add('hidden');
        overlay.classList.add('hidden');
        timerLayer.classList.remove('hidden');
        timerText.innerText = '3';
        gameState = 'COUNTDOWN';
        SFX.start();
        let count = 3;
        const timer = setInterval(() => {
            count -= 1;
            if (count > 0) {
                timerText.innerText = String(count);
                playSound(440, 'square', 0.1, 0.05);
            } else if (count === 0) {
                timerText.innerText = 'DIVE!';
                playSound(820, 'square', 0.2, 0.07);
            } else {
                clearInterval(timer);
                timerLayer.classList.add('hidden');
                gameState = 'PLAYING';
            }
        }, 700);
    }

    function showTitle() {
        gameState = 'TITLE';
        startContent.classList.remove('hidden');
        endContent.classList.add('hidden');
        overlay.classList.remove('hidden');
        renderHighScores();
        updateHud();
    }

    function gameOver() {
        gameState = 'GAME_OVER';
        recordHighScore();
        document.getElementById('end-title').innerText = 'GAME OVER';
        document.getElementById('end-title').className = 'text-3xl font-black mb-2 text-red-400';
        document.getElementById('level-bonus-text').innerText = `Highest Stage: ${highestStage}`;
        document.getElementById('end-body').innerText = `Final Score: ${score}. Press ENTER to play again.`;
        startContent.classList.add('hidden');
        endContent.classList.remove('hidden');
        overlay.classList.remove('hidden');
        nextLevelBtn.classList.add('hidden');
    }

    function firePlayerBullet() {
        if (!player.active || playerBullets.length >= 2 || shootCooldownMs > 0) return;
        playerBullets.push({
            x: player.x + player.w / 2 - 2,
            y: player.y + player.h,
            w: 4,
            h: 10,
            dy: 340,
        });
        shootCooldownMs = 180;
        SFX.shoot();
    }

    function fireHeroBullet() {
        if (!hero.active || !player.active) return;
        const params = hero.params;
        const baseX = hero.x + hero.w / 2 - 2;
        const aimError = (Math.random() - 0.5) * params.aimError;
        heroBullets.push({
            x: baseX + aimError,
            y: hero.y - 8,
            w: 4,
            h: 10,
            dy: -(250 + stage * 8),
        });
        if (params.heroDualShot) {
            heroBullets.push({
                x: baseX + aimError - 9,
                y: hero.y - 8,
                w: 4,
                h: 10,
                dy: -(250 + stage * 8),
            });
        }
        SFX.heroFire();
    }

    function updatePlayer(dtMs, now) {
        if (!player.active && now >= player.respawnAt) {
            resetPlayer();
        }
        if (!player.active) return;

        const dt = dtMs / 1000;
        if (keys.left) player.x -= player.speed * dt;
        if (keys.right) player.x += player.speed * dt;
        player.x = clamp(player.x, 5, canvas.width - player.w - 5);
        player.y += player.descentSpeed * dt;

        if (player.y > canvas.height) {
            score += 100;
            player.y = -player.h;
            updateHud();
        }

        if (shootCooldownMs > 0) shootCooldownMs -= dtMs;
        if (keys.fire) firePlayerBullet();
    }

    function updateHeroAI(dtMs) {
        if (!hero.active) return;
        const dt = dtMs / 1000;
        const params = hero.params;
        hero.reactionTimer -= dtMs;

        if (hero.reactionTimer <= 0) {
            hero.reactionTimer = params.reactionDelay + Math.random() * 60;
            let target = player.active ? player.x + player.w / 2 - hero.w / 2 : hero.x;
            const heroMid = hero.x + hero.w / 2;
            const threats = playerBullets
                .filter(b => b.y < hero.y && b.y > hero.y - 260)
                .sort((a, b) => b.y - a.y);

            if (threats.length) {
                const threat = threats[0];
                target = threat.x < heroMid ? heroMid + 95 : heroMid - 95;
            }
            if (Math.random() < params.mistakeChance) {
                target += (Math.random() < 0.5 ? -1 : 1) * (70 + Math.random() * 80);
            }
            hero.targetX = clamp(target, 5, canvas.width - hero.w - 5);
        }

        const dx = hero.targetX - hero.x;
        const maxMove = params.heroSpeed * dt;
        hero.x += clamp(dx, -maxMove, maxMove);

        hero.fireTimer -= dtMs;
        if (hero.fireTimer <= 0) {
            fireHeroBullet();
            hero.fireTimer = params.fireMin + Math.random() * (params.fireMax - params.fireMin);
        }
    }

    function updateBullets(dtMs, now) {
        const dt = dtMs / 1000;

        for (let i = playerBullets.length - 1; i >= 0; i--) {
            const b = playerBullets[i];
            b.y += b.dy * dt;
            if (b.y > canvas.height + 20) {
                playerBullets.splice(i, 1);
                continue;
            }
            if (hero.active && rectsOverlap(hitbox(b, 0), hitbox(hero, 5))) {
                playerBullets.splice(i, 1);
                hero.active = false;
                hero.respawnAt = now + 2000;
                spawnExplosion(hero.x + hero.w / 2, hero.y + hero.h / 2, '#88ccff');
                SFX.explode();
                score += 1000 * stage;
                stage += 1;
                highestStage = Math.max(highestStage, stage);
                hero.params = getStageParams(stage);
                player.descentSpeed = hero.params.playerDescentSpeed;
                updateHud();
            }
        }

        for (let i = heroBullets.length - 1; i >= 0; i--) {
            const b = heroBullets[i];
            b.y += b.dy * dt;
            if (b.y < -20) {
                heroBullets.splice(i, 1);
                continue;
            }
            if (player.active && rectsOverlap(hitbox(b, 0), hitbox(player, 5))) {
                heroBullets.splice(i, 1);
                lives -= 1;
                spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, '#ff5577');
                SFX.explode();
                updateHud();
                if (lives <= 0) {
                    player.active = false;
                    gameOver();
                    return;
                }
                player.active = false;
                player.respawnAt = now + 1500;
            }
        }

        if (!hero.active && now >= hero.respawnAt) {
            resetHero();
        }
    }

    function updateExplosions(dtMs) {
        const dt = dtMs / 1000;
        for (let i = explosions.length - 1; i >= 0; i--) {
            explosions[i].life -= dt;
            if (explosions[i].life <= 0) explosions.splice(i, 1);
        }
    }

    function updateStars(dtMs) {
        const dt = dtMs / 1000;
        for (const star of stars) {
            star.y += star.speed * dt;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        }
    }

    function update(now) {
        const dtMs = Math.min(40, Math.max(0, now - lastTs));
        lastTs = now;
        updateStars(dtMs);
        updateExplosions(dtMs);
        if (gameState !== 'PLAYING') return;
        updatePlayer(dtMs, now);
        updateHeroAI(dtMs);
        updateBullets(dtMs, now);
    }

    function drawStars() {
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        stars.forEach(star => ctx.fillRect(star.x, star.y, star.size, star.size));
    }

    function drawAlienShip(x, y, w, h) {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff66ff';
        ctx.fillStyle = '#c025ff';
        ctx.beginPath();
        ctx.moveTo(x + w / 2, y + h);
        ctx.lineTo(x + w, y + h * 0.55);
        ctx.lineTo(x + w * 0.8, y + h * 0.2);
        ctx.lineTo(x + w * 0.6, y);
        ctx.lineTo(x + w * 0.4, y);
        ctx.lineTo(x + w * 0.2, y + h * 0.2);
        ctx.lineTo(x, y + h * 0.55);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffd447';
        ctx.fillRect(x + w * 0.2, y + h * 0.48, w * 0.6, 4);
        ctx.restore();
    }

    function drawHeroShip(x, y, w, h) {
        const tier = hero ? hero.params.heroUpgradeTier : 0;
        const glow = ['#6eb6ff', '#8cd3ff', '#b8f2ff'][Math.min(2, tier)] || '#6eb6ff';
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = glow;
        ctx.fillStyle = '#ddeeff';
        ctx.beginPath();
        ctx.moveTo(x + w / 2, y);
        ctx.lineTo(x + w, y + h * 0.68);
        ctx.lineTo(x + w * 0.7, y + h);
        ctx.lineTo(x + w * 0.3, y + h);
        ctx.lineTo(x, y + h * 0.68);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#3f88ff';
        ctx.fillRect(x + w * 0.22, y + h * 0.45, w * 0.56, 4);
        ctx.restore();
    }

    function drawDecorAliens() {
        if (gameState !== 'TITLE') return;
        const t = performance.now() * 0.002;
        for (let i = 0; i < 4; i++) {
            const x = 80 + i * 120 + Math.sin(t + i) * 20;
            const y = 210 + Math.cos(t + i * 0.7) * 12;
            drawAlienShip(x, y, 22, 18);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000010';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawStars();
        drawDecorAliens();

        if (player?.active) drawAlienShip(player.x, player.y, player.w, player.h);
        if (hero?.active) drawHeroShip(hero.x, hero.y, hero.w, hero.h);

        ctx.fillStyle = '#ffdd66';
        playerBullets.forEach(b => {
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffe066';
            ctx.fillRect(b.x, b.y, b.w, b.h);
        });
        ctx.fillStyle = '#6eb6ff';
        heroBullets.forEach(b => {
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#6eb6ff';
            ctx.fillRect(b.x, b.y, b.w, b.h);
        });
        ctx.shadowBlur = 0;

        explosions.forEach(ex => {
            const radius = (1 - ex.life / 0.35) * 22 + 4;
            ctx.strokeStyle = ex.color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = ex.life / 0.35;
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
        });
    }

    function gameLoop(now) {
        update(now);
        draw();
        animFrameId = requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'Space') { keys.fire = true; e.preventDefault(); }
        if (e.code === 'Enter') {
            if (gameState === 'TITLE' || gameState === 'GAME_OVER') startGame();
        }
    });

    window.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'Space') keys.fire = false;
    });

    function bindTouch(id, key) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true;  }, { passive: false });
        el.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
        el.addEventListener('touchcancel',e => { e.preventDefault(); keys[key] = false; }, { passive: false });
    }
    bindTouch('btn-left', 'left');
    bindTouch('btn-right', 'right');
    bindTouch('btn-fire', 'fire');

    document.getElementById('start-btn').addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    nextLevelBtn.addEventListener('click', startGame);
    highScoresBtn.addEventListener('click', () => highScoresPanel.classList.toggle('hidden'));

    quitBtn.addEventListener('click', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ action: 'quit' }, '*');
        } else {
            window.location.reload();
        }
    });

    muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        svgMuted.classList.toggle('hidden', !isMuted);
        svgUnmuted.classList.toggle('hidden', isMuted);
    });

    fullscreenBtn.addEventListener('click', () => {
        const el = document.documentElement;
        if (!document.fullscreenElement) {
            el.requestFullscreen && el.requestFullscreen();
        } else {
            document.exitFullscreen && document.exitFullscreen();
        }
    });

    (function () {
        let holdTimer = null;
        let isDragging = false;
        let dragOffX = 0;
        let dragOffY = 0;
        function startHold(clientX, clientY) {
            holdTimer = setTimeout(() => {
                isDragging = true;
                dpad.classList.add('is-dragging');
                const rect = dpad.getBoundingClientRect();
                dragOffX = clientX - rect.left;
                dragOffY = clientY - rect.top;
            }, 3000);
        }
        function stopHold() {
            clearTimeout(holdTimer);
            if (isDragging) {
                isDragging = false;
                dpad.classList.remove('is-dragging');
            }
        }
        function moveDpad(clientX, clientY) {
            if (!isDragging) return;
            dpad.style.right = 'auto';
            dpad.style.bottom = 'auto';
            dpad.style.left = `${clientX - dragOffX}px`;
            dpad.style.top = `${clientY - dragOffY}px`;
        }
        dpad.addEventListener('touchstart', e => startHold(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        dpad.addEventListener('touchend', stopHold);
        dpad.addEventListener('touchmove', e => { moveDpad(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
        dpad.addEventListener('mousedown', e => startHold(e.clientX, e.clientY));
        dpad.addEventListener('mouseup', stopHold);
        window.addEventListener('mousemove', e => moveDpad(e.clientX, e.clientY));
        window.addEventListener('mouseup', stopHold);
    })();

    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
    highScores = getHighScores();
    syncHighStats();
    renderHighScores();
    showTitle();
    lastTs = performance.now();
    animFrameId = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
